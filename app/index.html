<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScratchNScan</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>ScratchNScan</h1>
      <p>Turn packaged foods into simple homemade alternatives.</p>
      <nav aria-label="MVP flow">
        <ol>
          <li>Scan barcode or enter UPC</li>
          <li>Or upload front + ingredients label photos</li>
          <li>Understand product</li>
          <li>Get homemade alternative</li>
          <li>Scan another item</li>
        </ol>
      </nav>
      <section>
        <h2>MVP Navigation Shell</h2>
        <button>Scan / Enter UPC</button>
        <button>Upload Labels</button>
        <button disabled>Generate Homemade Alternative</button>
      </section>
      <p class="disclaimer">General food information only. Not medical advice.</p>
    </main>
  </body>
</html>
